# JetStream event bus. replicas:1 is the ONLY sub-3 value the reconciler accepts
# (2 is hard-rejected); the default of 3 won't fit a 7.7Gi cluster. Name must be
# "default" since the EventSource/Sensors don't set eventBusName.
apiVersion: argoproj.io/v1alpha1
kind: EventBus
metadata:
  name: default
  namespace: argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  jetstream:
    # Required: without it the reconciler rejects the spec ("a version for jetstream
    # needs to be specified") and the sync-wave gate blocks the EventSource/Sensors.
    # Pinned to a concrete version from the controller's supported list (not "latest").
    version: 2.10.10
    replicas: 1
    containerTemplate:
      resources:
        requests: {cpu: 50m, memory: 128Mi}
        limits: {memory: 256Mi}
    reloaderContainerTemplate:
      resources:
        requests: {cpu: 10m, memory: 32Mi}
        limits: {memory: 64Mi}
    metricsContainerTemplate:
      resources:
        requests: {cpu: 10m, memory: 32Mi}
        limits: {memory: 64Mi}
    persistence:
      storageClassName: standard
      accessMode: ReadWriteOnce
      volumeSize: 1Gi
    # replicas:1 on the STREAM is separate from jetstream.replicas on the bus. The
    # controller default is 3, which a single-node JetStream rejects ("replicas > 1 not
    # supported in non-clustered mode") — the sensor then can't create its stream and
    # never subscribes. Must match the 1-node bus.
    streamConfig: |
      maxAge: 1h
      maxBytes: 100000000
      replicas: 1

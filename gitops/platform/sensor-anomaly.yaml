# An ANOMALY event submits rollback-score: abort the Rollout (fast) and git-revert the
# bad promote (durable), so Argo CD stops wanting to apply the broken desired state.
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: on-anomaly
  namespace: argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  template:
    serviceAccountName: operate-workflow-sa
  dependencies:
    - name: match-dep
      eventSourceName: match
      eventName: matchevent
      filters:
        data:
          - path: body.type
            type: string
            value:
              - "^ANOMALY$"
  triggers:
    - template:
        name: rollback-score-trigger
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: rollback-score-
                namespace: argo
              spec:
                serviceAccountName: workflow-sa
                workflowTemplateRef:
                  name: rollback-score
                arguments:
                  parameters:
                    - {name: reason, value: "unspecified"}
                    - {name: score, value: "0-0"}
          parameters:
            - src: {dependencyName: match-dep, dataKey: body.reason, value: "anomaly"}
              dest: spec.arguments.parameters.0.value
            - src: {dependencyName: match-dep, dataKey: body.score, value: "0-0"}
              dest: spec.arguments.parameters.1.value

# sync-groups: pull the live standings from /get/groups and materialize ONE DIRECTORY PER
# GROUP in git (gitops/groups/A..L/standings.yaml). The ApplicationSet's git directory
# generator watches that path, so writing a directory here is what creates an Argo CD
# Application — the tournament structure generates the deployment topology.
#
# Driven by cronwf-sync-groups every minute. Standings move slowly, so a 1-min CronWorkflow
# is the right fit here; goal detection stays on match-watcher's 30s loop (a CronWorkflow
# floors at 1 min and spawns a pod per tick — see AGENTS.md).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sync-groups
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  serviceAccountName: workflow-sa
  entrypoint: sync
  arguments:
    parameters:
      - {name: api-base, value: "https://worldcup26.ir"}
  templates:
    - name: sync
      inputs:
        parameters: [{name: api-base}]
      retryStrategy:
        limit: "3"
        retryPolicy: Always
        backoff: {duration: "10s", factor: "2"}
      script:
        image: alpine:3.20
        env:
          - {name: API_BASE, value: "{{inputs.parameters.api-base}}"}
          - name: GH_TOKEN
            valueFrom: {secretKeyRef: {name: github-creds, key: token}}
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {memory: 192Mi}
        command: [sh]
        source: |
          set -eu
          apk add --no-cache -q git curl jq

          # Fetch first and validate BEFORE cloning: a 429 (the API allows 120 req/60s) or
          # an upstream blip would otherwise commit empty standings over good data.
          curl -sS --max-time 20 "${API_BASE}/get/groups" -o /tmp/groups.json
          if ! jq -e '.groups | length > 0' /tmp/groups.json >/dev/null 2>&1; then
            echo "bad or empty /get/groups payload, refusing to commit" >&2
            head -c 300 /tmp/groups.json >&2; exit 1
          fi

          # /get/groups carries team_id only, so join it with /get/teams here rather than
          # making the UI do a second lookup: the table lands in git already displayable.
          curl -sS --max-time 20 "${API_BASE}/get/teams" -o /tmp/teams.json
          if ! jq -e '.teams | length > 0' /tmp/teams.json >/dev/null 2>&1; then
            echo "bad or empty /get/teams payload, refusing to commit" >&2; exit 1
          fi
          jq -c '[.teams[] | {key: (.id|tostring), value: {name: .name_en, code: .fifa_code, flag: .flag}}]
                 | from_entries' /tmp/teams.json > /tmp/teamidx.json

          REPO="github.com/cofo-jtorpoco/argo-world.git"
          git clone -q "https://x-access-token:${GH_TOKEN}@${REPO}" repo
          cd repo
          git config user.email "argo-bot@worldcup.local"
          git config user.name  "argo-groups-bot"

          # One directory per group => one Application per group, via the ApplicationSet's
          # directory generator. The ConfigMap carries the standings the UI reads.
          for g in $(jq -r '.groups[].name' /tmp/groups.json); do
            # The group letter is uppercase upstream, but a resource name must be an RFC
            # 1123 subdomain — `standings-A` is rejected by the API server. The directory
            # keeps the readable uppercase; only the object name is lowercased.
            gl=$(printf '%s' "$g" | tr 'A-Z' 'a-z')
            mkdir -p "gitops/groups/${g}"
            # Join each row against the team index and sort by pts desc, then goal
            # difference — the standings arrive in git already ordered and named.
            table=$(jq -c --arg g "$g" --slurpfile idx /tmp/teamidx.json '
              .groups[] | select(.name==$g) | .teams
              | map(. + {
                  name: ($idx[0][.team_id].name // ("team " + .team_id)),
                  code: ($idx[0][.team_id].code // ""),
                  flag: ($idx[0][.team_id].flag // "")
                })
              | sort_by([-(.pts|tonumber? // 0), -(.gd|tonumber? // 0)])
            ' /tmp/groups.json)
            cat > "gitops/groups/${g}/standings.yaml" <<EOF
          # Generated by the sync-groups Workflow from ${API_BASE}/get/groups.
          # Do not edit by hand: the next tick overwrites it.
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: standings-${gl}
            namespace: worldcup
            labels: {app: standings, group: "${g}"}
          data:
            group: "${g}"
            table: '${table}'
          EOF
          done

          git add gitops/groups
          if git diff --cached --quiet; then
            echo "standings unchanged"; exit 0
          fi
          git commit -q -m "standings: sync groups from live API"
          git pull -q --rebase origin main || true
          git push -q origin main
          echo "standings synced"

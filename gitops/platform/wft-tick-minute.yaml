# tick-minute: THE MATCH CLOCK, kept by the architecture rather than computed in code.
#
# The upstream sends time_elapsed:"live" during play — a word, not a number — so the minute
# is genuinely absent from the API. Instead of deriving it inside a service, a CronWorkflow
# fires once per minute and increments a counter in the match-clock ConfigMap. The clock
# advances because Argo Workflows ticks, and the scoreboard just reads it.
#
# Reset rules matter as much as the increment: a new match or a match that is not live must
# reset to 0, or the counter keeps climbing across fixtures and shows minute 300.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tick-minute
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  serviceAccountName: workflow-sa
  entrypoint: tick
  arguments:
    parameters:
      - {name: feed-url, value: "http://match-feed.worldcup.svc.cluster.local:8080/match/current"}
      - {name: api-base, value: "https://worldcup26.ir"}
      - {name: namespace, value: "worldcup"}
      - {name: configmap, value: "match-clock"}
  templates:
    - name: tick
      inputs:
        parameters:
          - {name: feed-url}
          - {name: api-base}
          - {name: namespace}
          - {name: configmap}
      script:
        image: alpine/k8s:1.31.2
        env:
          - {name: FEED_URL, value: "{{inputs.parameters.feed-url}}"}
          - {name: API_BASE, value: "{{inputs.parameters.api-base}}"}
          - {name: NS, value: "{{inputs.parameters.namespace}}"}
          - {name: CM, value: "{{inputs.parameters.configmap}}"}
        resources:
          requests: {cpu: 25m, memory: 64Mi}
          limits: {memory: 192Mi}
        command: [sh]
        source: |
          set -eu

          m=$(curl -sS --max-time 12 "$FEED_URL")
          mid=$(printf '%s' "$m" | jq -r '.match_id')
          status=$(printf '%s' "$m" | jq -r '.status')

          # Previous tick's state. Missing ConfigMap on the very first run is expected.
          prev_mid=$(kubectl -n "$NS" get cm "$CM" -o jsonpath='{.data.match_id}' 2>/dev/null || echo "")
          prev_min=$(kubectl -n "$NS" get cm "$CM" -o jsonpath='{.data.minute}' 2>/dev/null || echo "")
          prev_ht=$(kubectl -n "$NS" get cm "$CM" -o jsonpath='{.data.halftime_ticks}' 2>/dev/null || echo "")
          case "$prev_min" in ''|*[!0-9]*) prev_min=0 ;; esac
          case "$prev_ht" in ''|*[!0-9]*) prev_ht=0 ;; esac

          # Length of the half-time break, in ticks (== minutes). Real matches stop the
          # clock at 45'; a counter that keeps running through the break puts the whole
          # second half 15 minutes fast.
          HT_BREAK=15

          ht=$prev_ht
          if [ "$status" != "live" ]; then
            # Before kick-off and after the whistle the clock sits at 0 rather than drifting.
            minute=0
            ht=0
          elif [ "$mid" != "$prev_mid" ]; then
            # New fixture: restart the clock instead of inheriting the old match's minute.
            minute=1
            ht=0
          elif [ "$prev_min" -eq 45 ] && [ "$prev_ht" -lt "$HT_BREAK" ]; then
            # HALF TIME: hold at 45' for the length of the break. The tick still fires every
            # minute — it just doesn't advance the clock, which is what a real match does.
            minute=45
            ht=$((prev_ht + 1))
            echo "half time: holding at 45' (${ht}/${HT_BREAK})"
          else
            minute=$((prev_min + 1))
          fi

          # Anchor to reality, AFTER the branch so it also breaks the half-time hold: a goal
          # timestamped past 45' proves the second half is under way, whatever the counter
          # thinks. time_elapsed is the literal word "live" during play, so the running
          # minute is absent from the API — but the scorer strings carry each goal's minute
          # ("Azri Knsa 18'"). The latest goal is a hard floor: the match is at least that
          # far along. Without it a counter that starts late stays late all match.
          if [ "$status" = "live" ] && [ "$mid" = "$prev_mid" ]; then
            games=$(curl -sS --max-time 15 "${API_BASE}/get/games" 2>/dev/null || echo "")
            if [ -n "$games" ]; then
              last_goal=$(printf '%s' "$games" | jq -r --arg id "$mid" '
                [ .games[] | select(.id==$id) | (.home_scorers, .away_scorers) ]
                | map(select(. != null and . != "null")) | join(" ")
                | [ scan("[0-9]{1,3}") | tonumber ]
                | max // 0' 2>/dev/null || echo 0)
              case "$last_goal" in ''|*[!0-9]*) last_goal=0 ;; esac
              if [ "$last_goal" -gt "$minute" ]; then
                echo "anchoring clock to last goal at ${last_goal}' (counter was ${minute})"
                minute=$last_goal
                # A goal past the break means half time is over; stop holding.
                [ "$minute" -gt 45 ] && ht="$HT_BREAK" || true
              fi
            fi
          fi

          # Stoppage time is real, 300' is not. Clamp so a stuck feed can't run away.
          [ "$minute" -gt 120 ] && minute=120 || true

          kubectl -n "$NS" create configmap "$CM" \
            --from-literal=match_id="$mid" \
            --from-literal=minute="$minute" \
            --from-literal=status="$status" \
            --from-literal=halftime_ticks="$ht" \
            --dry-run=client -o yaml | kubectl apply -f - >/dev/null

          echo "clock: match ${mid} status=${status} minute=${minute} (prev ${prev_min}, ht ${ht})"

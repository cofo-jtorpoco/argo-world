# --- Service accounts + least-privilege roles that let the layers talk ---
# Three distinct SAs; conflating them is the classic Argo Events failure mode.
#   operate-workflow-sa (argo-events) : the Sensor POD's identity -> submits Workflows
#   workflow-sa         (argo)        : the submitted WORKFLOW's identity -> aborts Rollout
#   match-watcher       (worldcup)    : the poll loop -> mirrors state to a ConfigMap
apiVersion: v1
kind: ServiceAccount
metadata:
  name: operate-workflow-sa
  namespace: argo-events
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-sa
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: match-watcher
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
# Sensor pod (argo-events) must create Workflows in the argo namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operate-workflow-role
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operate-workflow-rb
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: operate-workflow-role}
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
    namespace: argo-events
---
# Submitted workflow (argo) must record task results (emissary executor: non-negotiable,
# omit it and workflows hang with no clear error) ...
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workflow-executor
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workflow-executor-rb
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: workflow-executor}
subjects:
  - kind: ServiceAccount
    name: workflow-sa
    namespace: argo
---
# ... and it must abort the Rollout, which is a patch on the status SUBRESOURCE, in the
# worldcup namespace where the Rollout lives.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollout-aborter
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts", "rollouts/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollout-aborter-rb
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: rollout-aborter}
subjects:
  - kind: ServiceAccount
    name: workflow-sa
    namespace: argo
---
# Watcher mirrors match state to a ConfigMap in its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: match-state-writer
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "patch", "update", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: match-state-writer-rb
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: match-state-writer}
subjects:
  - kind: ServiceAccount
    name: match-watcher
    namespace: worldcup
---
# The on-signals Sensor uses a `k8s` trigger to create a Rollouts Experiment on a penalty.
# That resource lands in worldcup, but the Sensor pod runs as operate-workflow-sa in
# argo-events, whose Role only covers Workflows in argo — without this the trigger fails
# with a forbidden that surfaces only in the sensor pod's log.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: experiment-creator
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["experiments"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: experiment-creator-rb
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: experiment-creator}
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
    namespace: argo-events
---
# The scoreboard reads the standings-* ConfigMaps back out of the cluster to render the
# group tables, so it needs its own SA — the default one can't list ConfigMaps. Scoped to
# list/watch only: the UI never writes.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scoreboard
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: standings-reader
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: standings-reader-rb
  namespace: worldcup
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: Role, name: standings-reader}
subjects:
  - kind: ServiceAccount
    name: scoreboard
    namespace: worldcup
